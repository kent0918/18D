<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍺 吹牛數位骰鐘 (完美視角版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0d0d0d; color: #fff;
            font-family: Arial, sans-serif; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            user-select: none; -webkit-user-select: none;
        }
        #canvas-container {
            width: 100%; flex-grow: 1; position: relative;
        }
        #ui-layer {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; gap: 15px; z-index: 10;
        }
        button {
            padding: 15px 25px; font-size: 1.2rem; font-weight: bold;
            border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8); transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .btn-peek { background: #3498db; color: white; }
        .btn-open { background: #e74c3c; color: white; }
        .btn-shake { background: #f1c40f; color: black; display: none; }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            background: #2ecc71; color: white; padding: 20px 40px; font-size: 1.5rem;
            border-radius: 50px; animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px #2ecc71; }
            100% { transform: scale(1); }
        }
        #debug-log {
            position: absolute; top: 10px; left: 10px; color: #aaa; font-size: 12px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="color:#bbb; margin-bottom: 20px;">準備好你的酒杯</h2>
        <button id="start-btn" onclick="initGame()">進入骰鐘 (啟用搖晃)</button>
    </div>

    <div id="canvas-container"></div>
    <div id="debug-log">準備就緒...</div>

    <div id="ui-layer">
        <button class="btn-shake" id="shake-btn" onclick="triggerShake()">搖骰</button>
        <button class="btn-peek" id="peek-btn">👁️ 按住偷看</button>
        <button class="btn-open" id="open-btn" onclick="toggleOpen()">🚨 開牌！</button>
    </div>

    <script>
        let scene, camera, renderer, cupGroup, diceArray = [];
        let isRolling = false;
        let cupState = 'closed'; 
        let rollFrames = 0;
        const diceCount = 5;

        function createDiceTexture(number) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 256, 256);
            ctx.lineWidth = 8; ctx.strokeStyle = '#bdc3c7'; ctx.strokeRect(4, 4, 248, 248);

            ctx.fillStyle = (number === 1 || number === 4) ? '#c0392b' : '#2c3e50';
            const dots = {
                1: [[128, 128, 30]],
                2: [[64, 64, 20], [192, 192, 20]],
                3: [[64, 64, 20], [128, 128, 20], [192, 192, 20]],
                4: [[64, 64, 20], [64, 192, 20], [192, 64, 20], [192, 192, 20]],
                5: [[64, 64, 20], [64, 192, 20], [128, 128, 20], [192, 64, 20], [192, 192, 20]],
                6: [[64, 64, 20], [64, 128, 20], [64, 192, 20], [192, 64, 20], [192, 128, 20], [192, 192, 20]]
            };

            dots[number].forEach(d => {
                ctx.beginPath(); ctx.arc(d[0], d[1], d[2], 0, Math.PI * 2); ctx.fill();
            });
            return new THREE.CanvasTexture(canvas);
        }

        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 12, 14); // 視角拉高一點，視野更好
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const spotLight = new THREE.SpotLight(0xffffff, 0.8);
            spotLight.position.set(0, 20, 10);
            spotLight.castShadow = true;
            scene.add(spotLight);

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(50, 50),
                new THREE.MeshStandardMaterial({ color: 0x5e1010, roughness: 0.8 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            cupGroup = new THREE.Group();
            const cupGeo = new THREE.CylinderGeometry(4.5, 5, 7.5, 32, 1, true); // 骰鐘改淺一點
            const cupMat = new THREE.MeshStandardMaterial({ color: 0x111111, side: THREE.DoubleSide, roughness: 0.4 });
            const cupBody = new THREE.Mesh(cupGeo, cupMat);
            
            const capGeo = new THREE.CircleGeometry(4.5, 32);
            const capMesh = new THREE.Mesh(capGeo, cupMat);
            capMesh.rotation.x = -Math.PI / 2;
            capMesh.position.y = 3.75;
            
            cupBody.castShadow = true;
            cupGroup.add(cupBody);
            cupGroup.add(capMesh);
            cupGroup.position.y = 3.75;
            scene.add(cupGroup);

            const diceGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const materials = [
                new THREE.MeshStandardMaterial({ map: createDiceTexture(1), roughness: 0.2 }), 
                new THREE.MeshStandardMaterial({ map: createDiceTexture(2), roughness: 0.2 }), 
                new THREE.MeshStandardMaterial({ map: createDiceTexture(3), roughness: 0.2 }), 
                new THREE.MeshStandardMaterial({ map: createDiceTexture(4), roughness: 0.2 }), 
                new THREE.MeshStandardMaterial({ map: createDiceTexture(5), roughness: 0.2 }), 
                new THREE.MeshStandardMaterial({ map: createDiceTexture(6), roughness: 0.2 })  
            ];

            // 把骰子集中的範圍縮小 (由 1.8 縮小為 1.4)，確保都在正中間
            const basePositions = [
                {x: -1.4, z: -1.4}, {x: 1.4, z: -1.4}, {x: 0, z: 0},
                {x: -1.4, z: 1.4}, {x: 1.4, z: 1.4}
            ];

            for(let i=0; i<diceCount; i++) {
                const mesh = new THREE.Mesh(diceGeo, materials);
                mesh.position.set(basePositions[i].x, 0.75, basePositions[i].z);
                mesh.castShadow = true;
                scene.add(mesh);
                diceArray.push({
                    mesh: mesh,
                    basePos: basePositions[i],
                    targetRot: new THREE.Euler()
                });
            }

            animate();
            triggerShake(); 
        }

        function initGame() {
            document.getElementById('start-screen').style.display = 'none';
            init3D();

            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(permissionState => {
                    if (permissionState === 'granted') {
                        window.addEventListener('devicemotion', handleMotion);
                    } else {
                        document.getElementById('shake-btn').style.display = 'block'; 
                    }
                }).catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
                document.getElementById('shake-btn').style.display = 'block';
            }

            const peekBtn = document.getElementById('peek-btn');
            const startPeek = (e) => { e.preventDefault(); if(!isRolling) cupState = 'peeking'; };
            const endPeek = (e) => { e.preventDefault(); if(cupState === 'peeking') cupState = 'closed'; };
            
            peekBtn.addEventListener('mousedown', startPeek);
            peekBtn.addEventListener('touchstart', startPeek);
            window.addEventListener('mouseup', endPeek);
            window.addEventListener('touchend', endPeek);
        }

        let lastX = 0, lastY = 0, lastZ = 0;
        function handleMotion(event) {
            let acc = event.accelerationIncludingGravity;
            if (!acc || !acc.x) return;
            let delta = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY) + Math.abs(acc.z - lastZ);
            
            if (delta > 25 && !isRolling) { 
                triggerShake();
            }
            lastX = acc.x; lastY = acc.y; lastZ = acc.z;
        }

        function triggerShake() {
            if(isRolling) return;
            isRolling = true;
            cupState = 'closed'; 
            rollFrames = 45; 
            
            if(navigator.vibrate) navigator.vibrate([50, 50, 50, 50, 100]); 
            document.getElementById('debug-log').innerText = "搖晃中...";

            const rotations = {
                1: {x: 0, y: 0, z: Math.PI/2},   
                2: {x: 0, y: 0, z: -Math.PI/2},  
                3: {x: 0, y: 0, z: 0},           
                4: {x: Math.PI, y: 0, z: 0},     
                5: {x: -Math.PI/2, y: 0, z: 0},  
                6: {x: Math.PI/2, y: 0, z: 0}    
            };

            diceArray.forEach(dice => {
                const result = Math.floor(Math.random() * 6) + 1;
                const baseRot = rotations[result];
                const randomY = Math.random() * Math.PI * 2;
                dice.targetRot.set(baseRot.x, randomY, baseRot.z);
            });
        }

        function toggleOpen() {
            if(isRolling) return;
            cupState = (cupState === 'open') ? 'closed' : 'open';
            const openBtn = document.getElementById('open-btn');
            openBtn.innerText = (cupState === 'open') ? "蓋上骰鐘" : "🚨 開牌！";
        }

        function animate() {
            requestAnimationFrame(animate);

            if (isRolling) {
                rollFrames--;
                cupGroup.position.x = (Math.random() - 0.5) * 1.5;
                cupGroup.position.z = (Math.random() - 0.5) * 1.5;
                
                diceArray.forEach(dice => {
                    dice.mesh.rotation.x += Math.random();
                    dice.mesh.rotation.y += Math.random();
                    dice.mesh.position.x = dice.basePos.x + (Math.random() - 0.5);
                    dice.mesh.position.z = dice.basePos.z + (Math.random() - 0.5);
                });

                if (rollFrames <= 0) {
                    isRolling = false;
                    cupGroup.position.set(0, 3.75, 0); 
                    
                    diceArray.forEach(dice => {
                        dice.mesh.rotation.copy(dice.targetRot);
                        // 稍微減少落地的隨機位移，讓骰子不會跑到太邊緣
                        dice.mesh.position.set(
                            dice.basePos.x + (Math.random()*0.3 - 0.15),
                            0.75, 
                            dice.basePos.z + (Math.random()*0.3 - 0.15)
                        );
                    });
                    document.getElementById('debug-log').innerText = "已就緒，請喊注";
                }
            } else {
                let targetY = 3.75;
                let targetRotX = 0;
                let targetZ = 0;

                if (cupState === 'peeking') {
                    // 【關鍵修正】把骰鐘抬得更高、往後退更多、仰角更大！
                    targetY = 9.5;      // 高度拉高 (原本 6.5)
                    targetRotX = -0.7;  // 往後仰角加大 (原本 -0.3)
                    targetZ = -3.5;     // 整體往後退 (原本 -1.5)
                } else if (cupState === 'open') {
                    targetY = 20;
                }

                cupGroup.position.y += (targetY - cupGroup.position.y) * 0.15;
                cupGroup.position.z += (targetZ - cupGroup.position.z) * 0.15;
                cupGroup.rotation.x += (targetRotX - cupGroup.rotation.x) * 0.15;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(!camera) return;
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
