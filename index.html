<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍻 派對骰子中心</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/RoundedBoxGeometry.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0d0d0d; color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            user-select: none; -webkit-user-select: none;
        }
        #canvas-container { width: 100%; flex-grow: 1; position: relative; }
        
        #bottom-ui-container {
            position: absolute; bottom: 25px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            gap: 15px; z-index: 10; pointer-events: none; 
        }

        /* 遊戲主按鈕列 */
        #ui-layer {
            display: none; justify-content: center; flex-wrap: wrap; gap: 10px; 
            width: 95%; max-width: 450px; pointer-events: auto; 
        }

        /* 🎯 抓骰子專用面板 (改用 Grid 網格系統確保按鈕絕對等大) */
        #extract-ui {
            display: none; /* 觸發時改為 grid */
            grid-template-columns: repeat(3, 1fr); /* 切成 3 等份寬度 */
            gap: 10px; width: 95%; max-width: 400px;
            pointer-events: auto; 
        }

        button {
            padding: 15px 25px; font-size: 1.1rem; font-weight: bold;
            border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8); transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { filter: grayscale(100%); cursor: not-allowed; transform: none; }
        
        .btn-peek { background: #3498db; color: white; }
        .btn-open { background: #e74c3c; color: white; }
        .btn-shake { background: #f1c40f; color: black; min-width: 120px; }
        .btn-menu { background: #7f8c8d; color: white; padding: 15px 20px; }
        
        /* 取骰按鈕基礎樣式與分組顏色 */
        .btn-extract { 
            color: white; padding: 12px 0; font-size: 1rem; 
            border-radius: 12px; text-align: center; width: 100%;
        }
        .color-rb { background: #c0392b; } /* 紅黑：深酒紅 */
        .color-oe { background: #8e44ad; } /* 單雙：羅蘭紫 */
        .color-bs { background: #d35400; } /* 大小：深橘色 */

        #menu-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2c3e50, #000000); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .menu-box {
            background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 15px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            text-align: center; width: 85%; max-width: 350px;
        }
        .menu-box h1 { margin-top: 0; color: #f1c40f; font-size: 1.8rem; }
        .setting-group { margin: 15px 0; text-align: left; }
        .setting-group label { display: block; margin-bottom: 8px; font-size: 1rem; color: #ecf0f1; }
        select {
            width: 100%; padding: 10px; font-size: 1.1rem; border-radius: 8px;
            background: #34495e; color: white; border: 1px solid #7f8c8d; outline: none;
        }
        .dice-counter { display: flex; align-items: center; justify-content: space-between; background: #34495e; border-radius: 8px; overflow: hidden; }
        .dice-counter button { border-radius: 0; box-shadow: none; background: #2c3e50; padding: 10px 15px; flex-grow: 1; font-size: 1.5rem; }
        .dice-counter span { font-size: 1.5rem; font-weight: bold; width: 50px; text-align: center; }
        #start-btn { background: #2ecc71; color: white; width: 100%; margin-top: 15px; padding: 15px; font-size: 1.3rem; }
        
        #debug-log { position: absolute; top: 10px; left: 10px; color: #aaa; font-size: 12px; pointer-events: none; z-index: 10; display: none; }
        #signature { position: fixed; bottom: 10px; right: 15px; color: rgba(255, 255, 255, 0.3); font-size: 0.85rem; letter-spacing: 1.5px; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div class="menu-box">
            <h1>🍻 派對骰子中心</h1>
            
            <div class="setting-group">
                <label>選擇遊戲模式：</label>
                <select id="game-mode">
                    <option value="cup">🎲 吹牛 (密閉黑骰鐘)</option>
                    <option value="bowl">🥣 十八仔 (古早味白瓷碗)</option>
                    <option value="extract">🎯 取骰挑戰 (紅黑單雙大小)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>選擇骰子款式：</label>
                <select id="dice-style">
                    <option value="plastic" selected>🎲 高仿塑膠 (白底/黑紅點)</option>
                    <option value="black">🖤 黑金奢華 (黑底/白紅點)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>選擇骰子數量 (1~10 顆)：</label>
                <div class="dice-counter">
                    <button onclick="changeDice(-1)">-</button>
                    <span id="dice-count-display">5</span>
                    <button onclick="changeDice(1)">+</button>
                </div>
            </div>

            <button id="start-btn" onclick="startGame()">進入遊戲</button>
        </div>
    </div>

    <div id="canvas-container"></div>
    <div id="debug-log">準備就緒...</div>

    <div id="bottom-ui-container">
        <div id="extract-ui">
            <button class="btn-extract color-rb" onclick="extractDice('red')">拿紅</button>
            <button class="btn-extract color-oe" onclick="extractDice('odd')">拿單</button>
            <button class="btn-extract color-bs" onclick="extractDice('small')">拿小</button>
            
            <button class="btn-extract color-rb" onclick="extractDice('black')">拿黑</button>
            <button class="btn-extract color-oe" onclick="extractDice('even')">拿雙</button>
            <button class="btn-extract color-bs" onclick="extractDice('big')">拿大</button>
        </div>

        <div id="ui-layer">
            <button class="btn-menu" onclick="backToMenu()">🔙 更換</button>
            <button class="btn-shake" id="shake-btn" onclick="toggleRoll()">⚡ 搖骰</button>
            <button class="btn-peek" id="peek-btn">👁️ 偷看</button>
            <button class="btn-open" id="open-btn" onclick="toggleOpen()">🚨 開牌！</button>
        </div>
    </div>

    <div id="signature">蔡肯特製作</div>

    <script>
        const THEME = {
            diceBg: '#fdfdfd', dotNormal: '#111111', dotSpecial: '#e71c1c', 
            metalness: 0.1, roughness: 0.15, bowlColor: '#f0ead6', bowlRimColor: '#40515e' 
        };

        let currentMode = 'cup'; 
        let diceCount = 5;
        let extractedCount = 0; 
        let gameState = 'idle'; 
        
        let scene, camera, renderer, containerGroup, diceArray = [];
        let cupState = 'closed'; 
        let is3DInitialized = false;

        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playClackSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(600 + Math.random() * 400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.03);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.02);
            osc.start(); osc.stop(audioCtx.currentTime + 0.03);
        }

        function changeDice(delta) {
            diceCount += delta;
            if (diceCount < 1) diceCount = 1;
            if (diceCount > 10) diceCount = 10;
            document.getElementById('dice-count-display').innerText = diceCount;
        }

        function backToMenu() {
            if (gameState !== 'idle') return;
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('extract-ui').style.display = 'none';
            document.getElementById('debug-log').style.display = 'none';
        }

        function applyDiceStyle() {
            const style = document.getElementById('dice-style').value;
            if (style === 'plastic') {
                THEME.diceBg = '#fcfcfc'; 
                THEME.dotNormal = '#151515'; 
                THEME.dotSpecial = '#e01515'; 
                THEME.metalness = 0.05; 
                THEME.roughness = 0.15; 
            } else if (style === 'black') {
                THEME.diceBg = '#1a1a1a';
                THEME.dotNormal = '#ffffff';
                THEME.dotSpecial = '#e74c3c';
                THEME.metalness = 0.5;
                THEME.roughness = 0.25;
            }
        }

        function startGame() {
            initAudio(); 
            currentMode = document.getElementById('game-mode').value;
            applyDiceStyle(); 
            extractedCount = 0; 

            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('extract-ui').style.display = 'none';
            document.getElementById('debug-log').style.display = 'block';

            if (currentMode === 'bowl') {
                document.getElementById('peek-btn').style.display = 'none';
                document.getElementById('open-btn').style.display = 'none';
            } else {
                document.getElementById('peek-btn').style.display = 'block';
                document.getElementById('open-btn').style.display = 'block';
            }

            if (!is3DInitialized) {
                init3D();
                requestPermissions();
                is3DInitialized = true;
            } else {
                buildGameObjects(); 
            }
        }

        function requestPermissions() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(permissionState => {
                    if (permissionState === 'granted') window.addEventListener('devicemotion', handleMotion);
                }).catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }

            const peekBtn = document.getElementById('peek-btn');
            const startPeek = () => { if(gameState === 'idle' && currentMode !== 'bowl') cupState = 'peeking'; };
            const endPeek = () => { if(cupState === 'peeking') cupState = 'closed'; };
            peekBtn.addEventListener('mousedown', startPeek);
            peekBtn.addEventListener('touchstart', startPeek, {passive: true});
            window.addEventListener('mouseup', endPeek);
            window.addEventListener('touchend', endPeek, {passive: true});
        }

        function createDiceTexture(number) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = THEME.diceBg; ctx.fillRect(0, 0, 256, 256);
            
            const color = (number === 1 || number === 4) ? THEME.dotSpecial : THEME.dotNormal;
            
            function drawDot(x, y, r) {
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fillStyle = color; ctx.fill();
                ctx.beginPath(); ctx.arc(x - r*0.2, y - r*0.2, r*0.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fill();
            }

            const r = 26; 
            if (number === 1) {
                drawDot(128, 128, r * 1.8); 
            } else if (number === 2) {
                drawDot(64, 64, r); drawDot(192, 192, r);
            } else if (number === 3) {
                drawDot(64, 64, r); drawDot(128, 128, r); drawDot(192, 192, r);
            } else if (number === 4) {
                drawDot(64, 64, r); drawDot(64, 192, r); drawDot(192, 64, r); drawDot(192, 192, r);
            } else if (number === 5) {
                drawDot(64, 64, r); drawDot(64, 192, r); drawDot(128, 128, r); drawDot(192, 64, r); drawDot(192, 192, r);
            } else if (number === 6) {
                drawDot(64, 50, r); drawDot(64, 128, r); drawDot(64, 206, r);
                drawDot(192, 50, r); drawDot(192, 128, r); drawDot(192, 206, r);
            }
            return new THREE.CanvasTexture(canvas);
        }

        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 17, 13); 
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const spotLight = new THREE.SpotLight(0xffffff, 1.0); 
            spotLight.position.set(5, 25, 10); spotLight.castShadow = true;
            scene.add(spotLight);

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(50, 50),
                new THREE.MeshStandardMaterial({ color: 0x3e2723, roughness: 0.9 })
            );
            floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
            scene.add(floor);

            buildGameObjects();
            animate();
        }

        function buildGameObjects() {
            if (containerGroup) scene.remove(containerGroup);
            diceArray.forEach(d => scene.remove(d.mesh));
            diceArray = [];
            extractedCount = 0;

            containerGroup = new THREE.Group();

            if (currentMode === 'cup' || currentMode === 'extract') {
                const cupGeo = new THREE.CylinderGeometry(4.5, 5, 7.5, 32, 1, true); 
                const cupMat = new THREE.MeshStandardMaterial({ color: 0x111111, side: THREE.DoubleSide, roughness: 0.4 });
                const cupBody = new THREE.Mesh(cupGeo, cupMat);
                const capGeo = new THREE.CircleGeometry(4.5, 32);
                const capMesh = new THREE.Mesh(capGeo, cupMat);
                capMesh.rotation.x = -Math.PI / 2; capMesh.position.y = 3.75;
                cupBody.castShadow = true;
                containerGroup.add(cupBody); containerGroup.add(capMesh);
                containerGroup.position.y = 3.75;
            } else if (currentMode === 'bowl') {
                const bowlGeo = new THREE.SphereGeometry(6, 32, 16, 0, Math.PI * 2, Math.PI / 2, Math.PI / 2);
                const bowlMat = new THREE.MeshStandardMaterial({ color: THEME.bowlColor, side: THREE.DoubleSide, roughness: 0.15, metalness: 0.05 });
                const bowlMesh = new THREE.Mesh(bowlGeo, bowlMat);
                bowlMesh.scale.set(1.2, 0.6, 1.2); bowlMesh.position.y = 3.6; 
                bowlMesh.castShadow = true; bowlMesh.receiveShadow = true;
                containerGroup.add(bowlMesh);

                const rimGeo = new THREE.TorusGeometry(6, 0.25, 16, 32);
                const rimMat = new THREE.MeshStandardMaterial({ color: THEME.bowlRimColor, roughness: 0.3, metalness: 0.05 });
                const rimMesh = new THREE.Mesh(rimGeo, rimMat);
                rimMesh.rotation.x = Math.PI / 2; rimMesh.scale.set(1.2, 1.2, 1.2); rimMesh.position.y = 3.6; 
                containerGroup.add(rimMesh);
                containerGroup.position.y = 0;
            }
            scene.add(containerGroup);

            const diceGeo = new THREE.RoundedBoxGeometry(1.4, 1.4, 1.4, 6, 0.35);
            const materials = [1,2,3,4,5,6].map(i => new THREE.MeshStandardMaterial({ map: createDiceTexture(i), roughness: THEME.roughness, metalness: THEME.metalness }));

            for(let i = 0; i < diceCount; i++) {
                const mesh = new THREE.Mesh(diceGeo, materials);
                mesh.rotation.order = 'YXZ'; 
                
                let angle = 0, radius = 0;
                if (diceCount === 1) { radius = 0; } 
                else if (diceCount <= 6) { radius = 1.4; angle = (i / diceCount) * Math.PI * 2; } 
                else {
                    if (i < 3) { radius = 0.8; angle = (i / 3) * Math.PI * 2; } 
                    else { radius = 2.2; angle = ((i - 3) / (diceCount - 3)) * Math.PI * 2; }
                }

                let baseX = Math.cos(angle) * radius; let baseZ = Math.sin(angle) * radius;

                mesh.position.set(baseX, 0.75, baseZ);
                mesh.castShadow = true;
                scene.add(mesh);
                
                diceArray.push({
                    mesh: mesh,
                    basePos: { x: baseX, z: baseZ },
                    spinVel: new THREE.Vector3(),
                    startRot: new THREE.Euler(), targetRot: new THREE.Euler(),
                    startPos: new THREE.Vector3(), targetPos: new THREE.Vector3(),
                    stopFrames: 0, stopDuration: 0, isStopped: true,
                    isExtracted: false, faceValue: 1 
                });
            }
        }

        let lastX = 0, lastY = 0, lastZ = 0;
        function handleMotion(event) {
            let acc = event.accelerationIncludingGravity;
            if (!acc || !acc.x) return;
            let delta = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY) + Math.abs(acc.z - lastZ);
            if (delta > 30) toggleRoll();
            lastX = acc.x; lastY = acc.y; lastZ = acc.z;
        }

        function toggleRoll() {
            if (gameState === 'idle') {
                let remaining = diceArray.filter(d => !d.isExtracted).length;
                if (remaining === 0) {
                    if(confirm("骰子已全部取出，要重新開始嗎？")) buildGameObjects();
                    return;
                }
                startRolling();
            } else if (gameState === 'rolling') {
                stopRolling();
            }
        }

        function startRolling() {
            initAudio(); 
            gameState = 'rolling';
            cupState = 'closed'; 
            document.getElementById('extract-ui').style.display = 'none'; 
            document.getElementById('shake-btn').innerText = "🛑 停止";
            document.getElementById('debug-log').innerText = "瘋狂搖晃中... (請按停止)";
            if(navigator.vibrate) navigator.vibrate(50); 

            diceArray.forEach(dice => {
                if(!dice.isExtracted) {
                    dice.spinVel.set((Math.random()-0.5)*1.5, (Math.random()-0.5)*1.5, (Math.random()-0.5)*1.5);
                }
            });
        }

        function stopRolling() {
            gameState = 'stopping';
            const shakeBtn = document.getElementById('shake-btn');
            shakeBtn.innerText = "⏳ 結算中..."; shakeBtn.disabled = true;
            if(navigator.vibrate) navigator.vibrate([80, 50]); 

            const rotations = {
                1: {x: 0, z: Math.PI/2},   2: {x: 0, z: -Math.PI/2},  
                3: {x: 0, z: 0},           4: {x: Math.PI, z: 0},     
                5: {x: -Math.PI/2, z: 0},  6: {x: Math.PI/2, z: 0}    
            };

            diceArray.forEach(dice => {
                if(!dice.isExtracted) {
                    const result = Math.floor(Math.random() * 6) + 1;
                    dice.faceValue = result; 
                    
                    const base = rotations[result];
                    const finalY = Math.random() * Math.PI * 2; 

                    dice.startRot.copy(dice.mesh.rotation);
                    
                    let signX = Math.sign(dice.spinVel.x) || 1; let signY = Math.sign(dice.spinVel.y) || 1; let signZ = Math.sign(dice.spinVel.z) || 1;
                    let extraSpinsX = (Math.floor(Math.random() * 3) + 2) * signX;
                    let extraSpinsY = (Math.floor(Math.random() * 3) + 2) * signY;
                    let extraSpinsZ = (Math.floor(Math.random() * 3) + 2) * signZ;

                    let targetX = base.x + Math.round((dice.startRot.x - base.x)/(Math.PI*2)) * Math.PI*2;
                    let targetY = finalY + Math.round((dice.startRot.y - finalY)/(Math.PI*2)) * Math.PI*2;
                    let targetZ = base.z + Math.round((dice.startRot.z - base.z)/(Math.PI*2)) * Math.PI*2;

                    dice.targetRot.set(targetX + extraSpinsX*Math.PI*2, targetY + extraSpinsY*Math.PI*2, targetZ + extraSpinsZ*Math.PI*2);
