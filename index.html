<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍻 派對骰子中心</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/RoundedBoxGeometry.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0d0d0d; color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            user-select: none; -webkit-user-select: none;
        }
        #canvas-container { width: 100%; flex-grow: 1; position: relative; }
        
        #ui-layer {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; z-index: 10;
            display: none; 
        }
        button {
            padding: 15px 25px; font-size: 1.1rem; font-weight: bold;
            border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8); transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .btn-peek { background: #3498db; color: white; }
        .btn-open { background: #e74c3c; color: white; }
        .btn-shake { background: #f1c40f; color: black; }
        .btn-menu { background: #7f8c8d; color: white; padding: 15px 20px; }

        #menu-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2c3e50, #000000); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .menu-box {
            background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 15px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            text-align: center; width: 85%; max-width: 350px;
        }
        .menu-box h1 { margin-top: 0; color: #f1c40f; font-size: 1.8rem; }
        .setting-group { margin: 15px 0; text-align: left; }
        .setting-group label { display: block; margin-bottom: 8px; font-size: 1rem; color: #ecf0f1; }
        select {
            width: 100%; padding: 10px; font-size: 1.1rem; border-radius: 8px;
            background: #34495e; color: white; border: 1px solid #7f8c8d; outline: none;
        }
        .dice-counter { display: flex; align-items: center; justify-content: space-between; background: #34495e; border-radius: 8px; overflow: hidden; }
        .dice-counter button { border-radius: 0; box-shadow: none; background: #2c3e50; padding: 10px 15px; flex-grow: 1; font-size: 1.5rem; }
        .dice-counter span { font-size: 1.5rem; font-weight: bold; width: 50px; text-align: center; }
        #start-btn { background: #2ecc71; color: white; width: 100%; margin-top: 15px; padding: 15px; font-size: 1.3rem; }
        
        #debug-log { position: absolute; top: 10px; left: 10px; color: #aaa; font-size: 12px; pointer-events: none; z-index: 10; display: none; }

        #signature {
            position: fixed; bottom: 10px; right: 15px; color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem; letter-spacing: 1.5px; z-index: 1000; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div class="menu-box">
            <h1>🍻 派對骰子中心</h1>
            
            <div class="setting-group">
                <label>選擇遊戲容器：</label>
                <select id="game-mode">
                    <option value="cup">🎲 吹牛 (密閉黑骰鐘)</option>
                    <option value="bowl">🥣 十八仔 (古早味白瓷碗)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>選擇骰子款式：</label>
                <select id="dice-style">
                    <option value="plastic" selected>🎲 經典塑膠 (亮白底/黑紅點)</option>
                    <option value="black">🖤 黑金奢華 (黑底/白紅點)</option>
                    <option value="white">🤍 溫潤白玉 (灰白底/黑紅點)</option>
                    <option value="red">❤️ 喜氣酒紅 (紅底/金白點)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>選擇骰子數量 (1~10 顆)：</label>
                <div class="dice-counter">
                    <button onclick="changeDice(-1)">-</button>
                    <span id="dice-count-display">5</span>
                    <button onclick="changeDice(1)">+</button>
                </div>
            </div>

            <button id="start-btn" onclick="startGame()">進入遊戲</button>
        </div>
    </div>

    <div id="canvas-container"></div>
    <div id="debug-log">準備就緒...</div>

    <div id="ui-layer">
        <button class="btn-menu" onclick="backToMenu()">🔙 更換</button>
        <button class="btn-shake" id="shake-btn" onclick="triggerShake()">⚡ 搖骰</button>
        <button class="btn-peek" id="peek-btn">👁️ 按住偷看</button>
        <button class="btn-open" id="open-btn" onclick="toggleOpen()">🚨 開牌！</button>
    </div>

    <div id="signature">蔡肯特製作</div>

    <script>
        // --- 視覺與顏色設定 ---
        const THEME = {
            diceBg: '#ffffff', 
            dotNormal: '#000000', 
            dotSpecial: '#ff0000', 
            metalness: 0.1, 
            roughness: 0.1,
            bowlColor: '#f0ead6',  
            bowlRimColor: '#40515e' 
        };

        let currentMode = 'cup'; 
        let diceCount = 5;
        
        let scene, camera, renderer, containerGroup, diceArray = [];
        let isRolling = false;
        let cupState = 'closed'; 
        let is3DInitialized = false;

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 短促的撞擊聲
        function playClackSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(600 + Math.random() * 400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.03);
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.02);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

        function changeDice(delta) {
            diceCount += delta;
            if (diceCount < 1) diceCount = 1;
            if (diceCount > 10) diceCount = 10;
            document.getElementById('dice-count-display').innerText = diceCount;
        }

        function backToMenu() {
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('debug-log').style.display = 'none';
        }

        function applyDiceStyle() {
            const style = document.getElementById('dice-style').value;
            if (style === 'plastic') {
                THEME.diceBg = '#ffffff'; // 亮白塑膠
                THEME.dotNormal = '#111111'; // 純黑
                THEME.dotSpecial = '#e71c1c'; // 鮮紅
                THEME.metalness = 0.05; 
                THEME.roughness = 0.1; // 表面光滑反光
            } else if (style === 'black') {
                THEME.diceBg = '#1a1a1a';
                THEME.dotNormal = '#ffffff';
                THEME.dotSpecial = '#e74c3c';
                THEME.metalness = 0.5;
                THEME.roughness = 0.25;
            } else if (style === 'white') {
                THEME.diceBg = '#e0ddcf'; // 象牙/骨頭色
                THEME.dotNormal = '#222222';
                THEME.dotSpecial = '#c0392b';
                THEME.metalness = 0.1;
                THEME.roughness = 0.3; // 較粗糙不反光
            } else if (style === 'red') {
                THEME.diceBg = '#8b0000';
                THEME.dotNormal = '#f1c40f';
                THEME.dotSpecial = '#ffffff';
                THEME.metalness = 0.4;
                THEME.roughness = 0.2;
            }
        }

        function startGame() {
            initAudio(); 
            currentMode = document.getElementById('game-mode').value;
            applyDiceStyle(); 

            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('debug-log').style.display = 'block';

            if (currentMode === 'bowl') {
                document.getElementById('peek-btn').style.display = 'none';
                document.getElementById('open-btn').style.display = 'none';
            } else {
                document.getElementById('peek-btn').style.display = 'block';
                document.getElementById('open-btn').style.display = 'block';
            }

            if (!is3DInitialized) {
                init3D();
                requestPermissions();
                is3DInitialized = true;
            } else {
                buildGameObjects(); 
                triggerShake();
            }
        }

        function requestPermissions() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(permissionState => {
                    if (permissionState === 'granted') window.addEventListener('devicemotion', handleMotion);
                }).catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }

            const peekBtn = document.getElementById('peek-btn');
            const startPeek = () => { if(!isRolling && currentMode === 'cup') cupState = 'peeking'; };
            const endPeek = () => { if(cupState === 'peeking') cupState = 'closed'; };
            
            peekBtn.addEventListener('mousedown', startPeek);
            peekBtn.addEventListener('touchstart', startPeek, {passive: true});
            window.addEventListener('mouseup', endPeek);
            window.addEventListener('touchend', endPeek, {passive: true});
        }

        function createDiceTexture(number) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = THEME.diceBg; ctx.fillRect(0, 0, 256, 256);
            ctx.fillStyle = (number === 1 || number === 4) ? THEME.dotSpecial : THEME.dotNormal;
            
            // 讓經典骰子的點數大一點、圓潤一點
            const dotSize = 35;
            const dots = {
                1: [[128, 128, dotSize * 1.2]], // 1點通常特別大
                2: [[64, 64, dotSize], [192, 192, dotSize]],
                3: [[64, 64, dotSize], [128, 128, dotSize], [192, 192, dotSize]],
                4: [[64, 64, dotSize], [64, 192, dotSize], [192, 64, dotSize], [192, 192, dotSize]],
                5: [[64, 64, dotSize], [64, 192, dotSize], [128, 128, dotSize], [192, 64, dotSize], [192, 192, dotSize]],
                6: [[64, 64, dotSize], [64, 128, dotSize], [64, 192, dotSize], [192, 64, dotSize], [192, 128, dotSize], [192, 192, dotSize]]
            };
            dots[number].forEach(d => { ctx.beginPath(); ctx.arc(d[0], d[1], d[2], 0, Math.PI * 2); ctx.fill(); });
            return new THREE.CanvasTexture(canvas);
        }

        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 100);
            
            camera.position.set(0, 14, 12); 
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const spotLight = new THREE.SpotLight(0xffffff, 1.0); 
            spotLight.position.set(5, 25, 10); spotLight.castShadow = true;
            scene.add(spotLight);

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(50, 50),
                new THREE.MeshStandardMaterial({ color: 0x3e2723, roughness: 0.9 })
            );
            floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
            scene.add(floor);

            buildGameObjects();
            animate();
            triggerShake();
        }

        function buildGameObjects() {
            if (containerGroup) scene.remove(containerGroup);
            diceArray.forEach(d => scene.remove(d.mesh));
            diceArray = [];

            containerGroup = new THREE.Group();

            if (currentMode === 'cup') {
                const cupGeo = new THREE.CylinderGeometry(4.5, 5, 7.5, 32, 1, true); 
                const cupMat = new THREE.MeshStandardMaterial({ color: 0x111111, side: THREE.DoubleSide, roughness: 0.4 });
                const cupBody = new THREE.Mesh(cupGeo, cupMat);
                const capGeo = new THREE.CircleGeometry(4.5, 32);
                const capMesh = new THREE.Mesh(capGeo, cupMat);
                capMesh.rotation.x = -Math.PI / 2; capMesh.position.y = 3.75;
                cupBody.castShadow = true;
                containerGroup.add(cupBody); containerGroup.add(capMesh);
                containerGroup.position.y = 3.75;
            } else if (currentMode === 'bowl') {
                const bowlGeo = new THREE.SphereGeometry(6, 32, 16, 0, Math.PI * 2, Math.PI / 2, Math.PI / 2);
                const bowlMat = new THREE.MeshStandardMaterial({ color: THEME.bowlColor, side: THREE.DoubleSide, roughness: 0.15, metalness: 0.05 });
                const bowlMesh = new THREE.Mesh(bowlGeo, bowlMat);
                bowlMesh.scale.set(1.2, 0.6, 1.2); 
                bowlMesh.position.y = 3.6; 
                bowlMesh.castShadow = true; bowlMesh.receiveShadow = true;
                containerGroup.add(bowlMesh);

                const rimGeo = new THREE.TorusGeometry(6, 0.25, 16, 32);
                const rimMat = new THREE.MeshStandardMaterial({ color: THEME.bowlRimColor, roughness: 0.3, metalness: 0.05 });
                const rimMesh = new THREE.Mesh(rimGeo, rimMat);
                rimMesh.rotation.x = Math.PI / 2;
                rimMesh.scale.set(1.2, 1.2, 1.2);
                rimMesh.position.y = 3.6; 
                containerGroup.add(rimMesh);

                containerGroup.position.y = 0;
            }
            scene.add(containerGroup);

            // 經典塑膠骰子可以稍微小一點點、圓角大一點點
            const diceGeo = new THREE.RoundedBoxGeometry(1.4, 1.4, 1.4, 6, 0.25);
            const materials = [1,2,3,4,5,6].map(i => new THREE.MeshStandardMaterial({ map: createDiceTexture(i), roughness: THEME.roughness, metalness: THEME.metalness }));

            for(let i = 0; i < diceCount; i++) {
                const mesh = new THREE.Mesh(diceGeo, materials);
                mesh.rotation.order = 'YXZ'; 
                
                let angle = 0, radius = 0;
                if (diceCount === 1) {
                    radius = 0;
                } else if (diceCount <= 6) {
                    radius = 1.4;
                    angle = (i / diceCount) * Math.PI * 2;
                } else {
                    if (i < 3) {
                        radius = 0.8;
                        angle = (i / 3) * Math.PI * 2;
                    } else {
                        radius = 2.2;
                        angle = ((i - 3) / (diceCount - 3)) * Math.PI * 2;
                    }
                }

                let baseX = Math.cos(angle) * radius;
                let baseZ = Math.sin(angle) * radius;

                mesh.position.set(baseX, 0.75, baseZ);
                mesh.castShadow = true;
                scene.add(mesh);
                
                diceArray.push({
                    mesh: mesh,
                    basePos: { x: baseX, z: baseZ },
                    targetRot: new THREE.Euler(),
                    targetQuat: new THREE.Quaternion(),
                    rollFrames: 0,
                    spinSpeed: 0,
                    spinAxis: new THREE.Vector3(),
                    isSettled: true
                });
            }
        }

        let lastX = 0, lastY = 0, lastZ = 0;
        function handleMotion(event) {
            let acc = event.accelerationIncludingGravity;
            if (!acc || !acc.x) return;
            let delta = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY) + Math.abs(acc.z - lastZ);
            if (delta > 25 && !isRolling) triggerShake();
            lastX = acc.x; lastY = acc.y; lastZ = acc.z;
        }

        function triggerShake() {
            if(isRolling) return;
            initAudio(); 
            isRolling = true;
            cupState = 'closed'; 
            
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]); 
            document.getElementById('debug-log').innerText = "骰子轉動中...";

            const rotations = {
                1: {x: 0, y: 0, z: Math.PI/2},   2: {x: 0, y: 0, z: -Math.PI/2},  
                3: {x: 0, y: 0, z: 0},           4: {x: Math.PI, y: 0, z: 0},     
                5: {x: -Math.PI/2, y: 0, z: 0},  6: {x: Math.PI/2, y: 0, z: 0}    
            };

            diceArray.forEach(dice => {
                const result = Math.floor(Math.random() * 6) + 1;
                const randomY = Math.random() * Math.PI * 2;
                dice.targetRot.set(rotations[result].x, randomY, rotations[result].z, 'YXZ');
                dice.targetQuat.setFromEuler(dice.targetRot); // 預先算好最終要翻倒的角度
                
                // 【物理差異化】：每顆骰子隨機賦予不同的「旋轉壽命」
                // 碗公模式壽命超長 (部分骰子會轉很久)；骰鐘模式則統一快停
                dice.rollFrames = (currentMode === 'bowl') 
                    ? 50 + Math.floor(Math.random() * 90)  
                    : 30 + Math.floor(Math.random() * 20); 
                
                dice.spinSpeed = 0.5 + Math.random() * 0.4; // 初始亂轉速度
                dice.spinAxis = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
                dice.isSettled = false;
                
                // 稍微彈起
                dice.mesh.position.y = 0.75 + Math.random() * 2;
            });
        }

        function toggleOpen() {
            if(isRolling || currentMode === 'bowl') return;
            cupState = (cupState === 'open') ? 'closed' : 'open';
            document.getElementById('open-btn').innerText = (cupState === 'open') ? "蓋上骰鐘" : "🚨 開牌！";
        }

        function animate() {
            requestAnimationFrame(animate);

            if (isRolling) {
                let anyRolling = false;
                
                if (currentMode === 'cup') {
                    // 只要還在搖，骰鐘就微微震動
                    containerGroup.position.x = (Math.random() - 0.5) * 1.5;
                    containerGroup.position.z = (Math.random() - 0.5) * 1.5;
                }
                
                diceArray.forEach(dice => {
                    if (dice.rollFrames > 0) {
                        anyRolling = true;
                        dice.rollFrames--;
                        
                        // 【重點：最後 10 幀呈現「物理吸附/翻倒」效果】
                        if (dice.rollFrames < 10) {
                            dice.mesh.quaternion.slerp(dice.targetQuat, 0.4); // 像磁鐵一樣吸到正確的面
                            dice.mesh.position.lerp(new THREE.Vector3(dice.basePos.x, 0.75, dice.basePos.z), 0.4);
                        } else {
                            // 自由旋轉減速階段
                            dice.spinSpeed *= 0.96; // 摩擦力減速
                            dice.mesh.rotateOnWorldAxis(dice.spinAxis, dice.spinSpeed);
                            
                            let wiggle = dice.spinSpeed * 1.5;
                            dice.mesh.position.x = dice.basePos.x + (Math.random() - 0.5) * wiggle;
                            dice.mesh.position.z = dice.basePos.z + (Math.random() - 0.5) * wiggle;
                            
                            if (currentMode === 'bowl') {
                                // 碗公裡面會有跳動感
                                dice.mesh.position.y = 0.75 + Math.abs(Math.sin(dice.rollFrames * 0.3)) * dice.spinSpeed * 4;
                            } else {
                                dice.mesh.position.y = 0.75 + Math.random() * wiggle;
                            }

                            // 根據轉速發出隨機的撞擊聲與震動
                            if (dice.spinSpeed > 0.08 && Math.random() < dice.spinSpeed) {
                                playClackSound();
                                if(navigator.vibrate) navigator.vibrate(10);
                            }
                        }
                    } else if (!dice.isSettled) {
                        // 完全靜止
                        dice.isSettled = true;
                        dice.mesh.rotation.copy(dice.targetRot);
                        dice.mesh.position.set(
                            dice.basePos.x + (Math.random()*0.1 - 0.05),
                            0.75, 
                            dice.basePos.z + (Math.random()*0.1 - 0.05)
                        );
                        playClackSound(); // 落定的清脆聲
                        if(navigator.vibrate) navigator.vibrate(20);
                    }
                });

                if (!anyRolling) {
                    isRolling = false;
                    if (currentMode === 'cup') containerGroup.position.set(0, 3.75, 0); 
                    document.getElementById('debug-log').innerText = "已就緒";
                }

            } else if (currentMode === 'cup') {
                // 骰鐘開關動畫
                let targetY = 3.75; let targetRotX = 0; let targetZ = 0;
                if (cupState === 'peeking') {
                    targetY = 9.5; targetRotX = -0.7; targetZ = -3.5;     
                } else if (cupState === 'open') {
                    targetY = 20;
                }
                containerGroup.position.y += (targetY - containerGroup.position.y) * 0.15;
                containerGroup.position.z += (targetZ - containerGroup.position.z) * 0.15;
                containerGroup.rotation.x += (targetRotX - containerGroup.rotation.x) * 0.15;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(!camera) return;
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
