<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍺 隨身 3D 骰鐘</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        #ui-top {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241,196,15,0.5);
        }

        #canvas-container {
            width: 100%;
            flex-grow: 1;
            position: relative;
        }

        #ui-bottom {
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, background-color 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-shake {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .btn-peek {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        /* 骰鐘蓋住時的遮罩效果 */
        #cup-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, #34495e 30%, #2c3e50 80%);
            border: 8px solid #1a252f;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.6);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        #cup-overlay.lifted {
            transform: translate(-50%, -150%) scale(0.8);
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="ui-top">🎲 乾杯骰鐘</div>

    <div id="canvas-container">
        <div id="cup-overlay">🎲</div>
    </div>

    <div id="ui-bottom">
        <button class="btn-shake" onclick="shakeCup()">⚡ 搖骰子</button>
        <button class="btn-peek" onmousedown="peek(true)" onmouseup="peek(false)" ontouchstart="peek(true)" ontouchend="peek(false)">👁️ 按住看牌</button>
    </div>

    <script>
        let scene, camera, renderer, diceArray = [];
        const diceCount = 5; // 預設 5 顆骰子
        const container = document.getElementById('canvas-container');
        const cupOverlay = document.getElementById('cup-overlay');

        // 創建 1~6 點的畫布貼圖 (用程式碼直接畫出點數，不用外部圖檔)
        function createDiceTexture(number) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // 底色
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 128, 128);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#bdc3c7';
            ctx.strokeRect(2, 2, 124, 124);

            // 畫點數
            ctx.fillStyle = (number === 1 || number === 4) ? '#e74c3c' : '#2c3e50'; // 1,4點用紅色，其餘深藍
            const dots = {
                1: [[64, 64, 18]],
                2: [[32, 32, 10], [96, 96, 10]],
                3: [[32, 32, 10], [64, 64, 10], [96, 96, 10]],
                4: [[32, 32, 10], [32, 96, 10], [96, 32, 10], [96, 96, 10]],
                5: [[32, 32, 10], [32, 96, 10], [64, 64, 10], [96, 32, 10], [96, 96, 10]],
                6: [[32, 32, 10], [32, 64, 10], [32, 96, 10], [96, 32, 10], [96, 64, 10], [96, 96, 10]]
            };

            dots[number].forEach(d => {
                ctx.beginPath();
                ctx.arc(d[0], d[1], d[2], 0, Math.PI * 2);
                ctx.fill();
            });

            return new THREE.CanvasTexture(canvas);
        }

        // 初始化 3D 場景
        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 10, 0); // 從正上方往下看
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // 光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 15, 5);
            scene.add(dirLight);

            // 產生 1~6 面的材質
            const materials = [];
            // Three.js 的方塊六面順序：右、左、上、下、前、後
            // 這裡對應設定：右1、左2、上3、下4、前5、後6
            for (let i = 1; i <= 6; i++) {
                materials.push(new THREE.MeshStandardMaterial({ map: createDiceTexture(i), roughness: 0.3 }));
            }

            // 建立 5 顆骰子
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            
            // 骰子在圓盤內的固定排布位置 (防止重疊)
            const positions = [
                {x: -1.2, z: -1.2}, {x: 1.2, z: -1.2},
                {x: 0, z: 0},
                {x: -1.2, z: 1.2}, {x: 1.2, z: 1.2}
            ];

            for (let i = 0; i < diceCount; i++) {
                const dice = new THREE.Mesh(geometry, materials);
                dice.position.set(positions[i].x, 0, positions[i].z);
                scene.add(dice);
                diceArray.push({
                    mesh: dice,
                    targetRotation: new THREE.Euler(),
                    isRolling: false,
                    rollSpeed: 0
                });
            }

            animate();
            shakeCup(); // 一進網頁自動搖一次
        }

        // 搖骰子邏輯（模擬生動的滾動與亂數點數）
        function shakeCup() {
            cupOverlay.classList.remove('lifted'); // 搖骰時強制蓋上骰鐘
            
            // 定義 6 個點數朝上時，Three.js 骰子對應的旋轉角度 (弧度)
            const rotations = {
                1: {x: 0, y: 0, z: -Math.PI/2}, // 右面朝上
                2: {x: 0, y: 0, z: Math.PI/2},  // 左面朝上
                3: {x: 0, y: 0, z: 0},          // 上面朝上
                4: {x: Math.PI, y: 0, z: 0},    // 下面朝上
                5: {x: -Math.PI/2, y: 0, z: 0}, // 前面朝上
                6: {x: Math.PI/2, y: 0, z: 0}  // 後面朝上
            };

            diceArray.forEach(dice => {
                dice.isRolling = true;
                dice.rollSpeed = 0.3 + Math.random() * 0.2;
                
                // 亂數決定最終點數 (1~6)
                const finalResult = Math.floor(Math.random() * 6) + 1;
                const baseRot = rotations[finalResult];

                // 加上隨機的 360 度倍數，讓旋轉動畫看起來更瘋狂、更生動
                dice.targetRotation.x = baseRot.x + (Math.floor(Math.random() * 4) + 3) * Math.PI * 2;
                dice.targetRotation.y = baseRot.y + (Math.floor(Math.random() * 4) + 3) * Math.PI * 2;
                dice.targetRotation.z = baseRot.z + (Math.floor(Math.random() * 4) + 3) * Math.PI * 2;
            });

            // 手機微震動回饋 (如果裝置支援)
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }

        // 看牌按鈕控制
        function peek(isPeeking) {
            if (isPeeking) {
                cupOverlay.classList.add('lifted'); // 移開骰鐘
            } else {
                cupOverlay.classList.remove('lifted'); // 蓋回骰鐘
            }
        }

        // 每幀動畫渲染
        function animate() {
            requestAnimationFrame(animate);

            diceArray.forEach(dice => {
                if (dice.isRolling) {
                    // 使用平滑插值 (Lerp) 讓骰子旋轉慢慢減速，最後精準停在目標點數
                    dice.mesh.rotation.x += (dice.targetRotation.x - dice.mesh.rotation.x) * dice.rollSpeed;
                    dice.mesh.rotation.y += (dice.targetRotation.y - dice.mesh.rotation.y) * dice.rollSpeed;
                    dice.mesh.rotation.z += (dice.targetRotation.z - dice.mesh.rotation.z) * dice.rollSpeed;

                    // 接近目標角度時停止旋轉
                    if (Math.abs(dice.targetRotation.x - dice.mesh.rotation.x) < 0.01) {
                        dice.mesh.rotation.copy(dice.targetRotation);
                        dice.isRolling = false;
                    }
                } else {
                    // 沒在搖的時候，骰子在原地微微無規則晃動，看起來更逼真
                    dice.mesh.rotation.y += 0.005;
                }
            });

            renderer.render(scene, camera);
        }

        // 視窗大小改變時自動調整 3D 尺寸
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
